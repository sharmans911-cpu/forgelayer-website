<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ForgeLayer — Custom 3D Prints</title>
  <meta name="description" content="Custom 3D printing from home — personalised gifts, home organisers, prototypes and more." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:   #0a0a0a;
      --dark:    #111827;
      --card:    #1a2236;
      --accent:  #00d9a6;
      --accent2: #0098ff;
      --text:    #e2e8f0;
      --muted:   #94a3b8;
      --border:  #1e3a5f;
      --white:   #ffffff;
      --radius:  14px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--black); color: var(--text); line-height: 1.6; }
    a { color: inherit; text-decoration: none; }

    /* Loading */
    #loader {
      position: fixed; inset: 0; background: var(--black);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; transition: opacity 0.4s;
    }
    .loader-ring {
      width: 48px; height: 48px; border-radius: 50%;
      border: 3px solid rgba(0,217,166,0.15);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Nav */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 5%;
      background: rgba(10,10,10,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .logo { display: flex; align-items: center; text-decoration: none; }
    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-links a { font-size: 0.9rem; color: var(--muted); transition: color 0.2s; }
    .nav-links a:hover { color: var(--white); }
    .nav-cta {
      background: var(--accent); color: var(--black) !important;
      padding: 8px 20px; border-radius: 8px; font-weight: 700; font-size: 0.85rem !important;
    }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
    .hamburger span { width: 24px; height: 2px; background: var(--text); border-radius: 2px; }

    /* Shared section */
    section { padding: 96px 5%; }
    .section-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; }
    h2 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; letter-spacing: -0.5px; line-height: 1.2; margin-bottom: 16px; }
    .section-sub { color: var(--muted); font-size: 1.05rem; max-width: 540px; }
    .section-head { margin-bottom: 56px; }

    /* Hero */
    .hero {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 120px 5% 80px;
      background: radial-gradient(ellipse 80% 60% at 50% 20%, rgba(0,217,166,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0,152,255,0.06) 0%, transparent 50%), var(--black);
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none;
    }
    .hero-inner { max-width: 760px; position: relative; }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(0,217,166,0.1); border: 1px solid rgba(0,217,166,0.3);
      padding: 6px 16px; border-radius: 100px; font-size: 0.8rem; color: var(--accent);
      font-weight: 600; margin-bottom: 28px; letter-spacing: 0.5px;
    }
    .hero-badge::before { content: '●'; font-size: 0.6rem; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    h1 { font-size: clamp(2.4rem, 6vw, 4.2rem); font-weight: 900; line-height: 1.1; letter-spacing: -1.5px; margin-bottom: 24px; }
    h1 em { font-style: normal; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero-sub { font-size: 1.15rem; color: var(--muted); max-width: 520px; margin: 0 auto 40px; line-height: 1.7; }
    .hero-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: var(--black); padding: 14px 32px; border-radius: 10px;
      font-weight: 800; font-size: 1rem; transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 32px rgba(0,217,166,0.25);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 48px rgba(0,217,166,0.4); }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid var(--border); color: var(--text); padding: 14px 28px; border-radius: 10px;
      font-weight: 600; font-size: 1rem; transition: border-color 0.2s, background 0.2s;
    }
    .btn-secondary:hover { border-color: var(--accent); background: rgba(0,217,166,0.05); }
    .hero-stats { display: flex; justify-content: center; gap: 48px; margin-top: 64px; padding-top: 40px; border-top: 1px solid rgba(255,255,255,0.07); flex-wrap: wrap; }
    .stat-num { font-size: 1.8rem; font-weight: 800; color: var(--white); }
    .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

    /* Products */
    #products { background: var(--dark); }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 24px; }
    .product-card {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 36px 28px; transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      position: relative; overflow: hidden;
    }
    .product-card::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(0,217,166,0.04), transparent); opacity: 0; transition: opacity 0.3s; }
    .product-card:hover { transform: translateY(-6px); border-color: var(--accent); box-shadow: 0 12px 40px rgba(0,217,166,0.1); }
    .product-card:hover::after { opacity: 1; }
    .card-icon { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; margin-bottom: 20px; }
    .card-icon.green  { background: rgba(0,217,166,0.12); }
    .card-icon.blue   { background: rgba(0,152,255,0.12); }
    .card-icon.purple { background: rgba(139,92,246,0.12); }
    .card-icon.orange { background: rgba(251,146,60,0.12); }
    .product-card h3 { font-size: 1.15rem; font-weight: 700; margin-bottom: 10px; }
    .product-card p  { font-size: 0.9rem; color: var(--muted); line-height: 1.65; margin-bottom: 20px; }
    .card-examples { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { font-size: 0.75rem; padding: 3px 10px; border-radius: 100px; background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid rgba(255,255,255,0.08); }
    .card-price { margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.07); font-size: 0.85rem; color: var(--accent); font-weight: 600; }

    /* How it works */
    #how { background: var(--black); }
    .steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 32px; }
    .step { text-align: center; padding: 8px; }
    .step-num {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 900; color: var(--black); margin: 0 auto 20px;
    }
    .step h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; }
    .step p { font-size: 0.9rem; color: var(--muted); }

    /* Gallery */
    #gallery { background: var(--dark); }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .gallery-item {
      aspect-ratio: 1; border-radius: 12px; overflow: hidden; position: relative;
      border: 1px solid var(--border); cursor: pointer; transition: transform 0.25s;
    }
    .gallery-item:hover { transform: scale(1.03); }
    .gallery-placeholder {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px; font-size: 2.4rem;
    }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-label { font-size: 0.7rem; color: rgba(255,255,255,0.5); font-weight: 600; letter-spacing: 0.5px; text-align: center; }
    .gallery-note { text-align: center; margin-top: 28px; font-size: 0.85rem; color: var(--muted); }

    /* Pricing */
    #pricing { background: var(--black); }
    .pricing-table { width: 100%; border-collapse: collapse; border-radius: var(--radius); overflow: hidden; }
    .pricing-table th { background: var(--card); padding: 16px 20px; text-align: left; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); border-bottom: 1px solid var(--border); }
    .pricing-table td { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.95rem; }
    .pricing-table tr:last-child td { border-bottom: none; }
    .pricing-table tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
    .pricing-table tr:hover td { background: rgba(0,217,166,0.04); }
    .price-from { color: var(--accent); font-weight: 700; }
    .pricing-note { margin-top: 20px; font-size: 0.85rem; color: var(--muted); padding: 16px 20px; background: var(--card); border-radius: 10px; border-left: 3px solid var(--accent); }

    /* Order */
    #order {
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(0,217,166,0.07) 0%, transparent 70%), var(--dark);
      text-align: center;
    }
    #order h2 { margin-bottom: 16px; }
    #order .section-sub { margin: 0 auto 40px; }
    .order-steps { display: flex; justify-content: center; flex-wrap: wrap; gap: 16px; margin-bottom: 40px; }
    .order-step-pill {
      background: var(--card); border: 1px solid var(--border); border-radius: 100px;
      padding: 10px 22px; font-size: 0.9rem; display: flex; align-items: center; gap: 10px;
    }
    .pill-num { width: 22px; height: 22px; border-radius: 50%; background: var(--accent); color: var(--black); font-size: 0.7rem; font-weight: 800; display: flex; align-items: center; justify-content: center; }
    .btn-order {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--accent); color: var(--black); padding: 18px 48px; border-radius: 12px;
      font-weight: 900; font-size: 1.1rem; box-shadow: 0 0 48px rgba(0,217,166,0.3);
      transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; border: none; text-decoration: none;
    }
    .btn-order:hover { transform: translateY(-3px); box-shadow: 0 0 64px rgba(0,217,166,0.5); }
    .order-sub { margin-top: 16px; font-size: 0.85rem; color: var(--muted); }

    /* FAQ */
    #faq { background: var(--black); }
    .faq-list { max-width: 720px; }
    .faq-item { border-bottom: 1px solid rgba(255,255,255,0.07); padding: 24px 0; }
    .faq-q { font-weight: 700; margin-bottom: 0; display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; cursor: pointer; }
    .faq-icon { color: var(--accent); font-size: 1.2rem; flex-shrink: 0; }
    .faq-a { color: var(--muted); font-size: 0.95rem; line-height: 1.7; margin-top: 12px; display: none; }

    /* Footer */
    footer {
      background: var(--dark); border-top: 1px solid rgba(255,255,255,0.06);
      padding: 40px 5%; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;
    }
    .footer-logo { display: flex; align-items: center; }
    footer p { font-size: 0.85rem; color: var(--muted); }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { font-size: 0.85rem; color: var(--muted); transition: color 0.2s; }
    .footer-links a:hover { color: var(--accent); }

    @media (max-width: 700px) {
      .nav-links { display: none; flex-direction: column; gap: 20px; }
      .nav-links.open { display: flex; position: absolute; top: 100%; left: 0; right: 0; background: var(--dark); padding: 28px 5%; border-bottom: 1px solid var(--border); }
      .hamburger { display: flex; }
      .hero-stats { gap: 28px; }
      footer { flex-direction: column; text-align: center; }
      .footer-links { justify-content: center; }
    }
  </style>
</head>
<body>

<div id="loader"><div class="loader-ring"></div></div>

<nav id="navbar">
  <a href="#home" class="logo">
    <svg height="36" viewBox="0 0 188 42" xmlns="http://www.w3.org/2000/svg" aria-label="ForgeLayer">

  <div class="nav-links" id="navLinks"></div>
  <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
</nav>

<div id="page-content"></div>
<footer id="site-footer"></footer>

<script>

{"item_type":"Prototype / complex","example":"Multi-part assemblies","price":"€15+","turnaround":"5–7 days"},{"item_type":"Bulk order (10+)","example":"Gifts, event items","price":"Discounted","turnaround":"Quote on request"}]},"order":{"enabled":true,"label":"Ready to order?","email":"orders@forgelayer.online","title":"Let's make something","subtitle":"Send us an email with your idea — no need to have all the details figured out. We'll help you get there.","button_text":"Email us your order","sub_text":"We reply within 24 hours · No upfront payment · Free quote","steps":[{"text":"Describe your idea"},{"text":"Pick colour & size"},{"text":"We send a quote"},{"text":"Confirm & we print"}]},"faq":{"enabled":true,"label":"FAQ","title":"Common questions","items":[{"q":"What materials do you print with?","a":"Primarily PLA and PETG — durable, food-safe options available on request. PLA is great for most decorative and functional items. PETG is tougher and heat-resistant."},{"q":"Can I request a custom design I found online?","a":"Yes — send us a link or the file. We work with STL, 3MF and STEP files. If you have a sketch or photo, we can often model something simple for a small design fee."},{"q":"How do I pay?","a":"Bank transfer (Überweisung) or PayPal. Payment is due after you've seen the final item — we don't ask for money upfront unless it's a large bulk order."},{"q":"Do you ship?","a":"Yes, we ship within Germany via DHL. Shipping cost is added to the order. Local pickup is also available."},{"q":"How long does it take?","a":"Most small items are ready in 2–3 days. Larger or more complex prints take 4–7 days. We'll always confirm the timeline before you commit."},{"q":"What if I'm not happy with the result?","a":"We'll reprint or refund. Quality matters to us — we send photos before shipping so you can check before we pack it."}]}};

// ─── Load content ────────────────────────────────────────────────────────────
async function loadContent() {
  try {
    const r = await fetch('content.json');
    if (r.ok) return await r.json();
  } catch(e) {}
  return DEFAULT;
}

// ─── Render helpers ──────────────────────────────────────────────────────────
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function mailtoLink(email, siteName) {
  const sub = encodeURIComponent(`3D Print Order Enquiry`);
  const body = encodeURIComponent(`Hi ${siteName},\n\nI'd like to order:\n\nItem / Idea: \nColour: \nSize / Quantity: \nDeadline (if any): \nAdditional notes: \n\nThanks!`);
  return `mailto:${email}?subject=${sub}&body=${body}`;
}

// ─── Section renderers ───────────────────────────────────────────────────────
function renderHero(d, site) {
  const stats = (d.stats || []).map(s => `
    <div><div class="stat-num">${esc(s.number)}</div><div class="stat-label">${esc(s.label)}</div></div>
  `).join('');
  return `
  <section class="hero" id="home">
    <div class="hero-inner">
      <div class="hero-badge">${esc(d.badge)}</div>
      <h1>${esc(d.headline)}<br/><em>${esc(d.headline_highlight)}</em></h1>
      <p class="hero-sub">${esc(d.subtext)}</p>
      <div class="hero-btns">
        <a href="#order" class="btn-primary">✉ ${esc(d.cta_primary)}</a>
        <a href="#products" class="btn-secondary">${esc(d.cta_secondary)} →</a>
      </div>
      ${stats ? `<div class="hero-stats">${stats}</div>` : ''}
    </div>
  </section>`;
}

function renderProducts(d) {
  const cards = (d.items || []).map(item => `
    <div class="product-card">
      <div class="card-icon ${esc(item.icon_style || 'green')}">${item.icon}</div>
      <h3>${esc(item.title)}</h3>
      <p>${esc(item.description)}</p>
      <div class="card-examples">${(item.tags||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
      <div class="card-price">${esc(item.price_from)} · Turnaround ${esc(item.turnaround)}</div>
    </div>`).join('');
  return `
  <section id="products">
    <div class="section-head">
      <div class="section-label">${esc(d.label)}</div>
      <h2>${esc(d.title)}</h2>
      <p class="section-sub">${esc(d.subtitle)}</p>
    </div>
    <div class="products-grid">${cards}</div>
  </section>`;
}

function renderHow(d) {
  const steps = (d.steps || []).map((s, i) => `
    <div class="step">
      <div class="step-num">${i + 1}</div>
      <h3>${esc(s.title)}</h3>
      <p>${esc(s.description)}</p>
    </div>`).join('');
  return `
  <section id="how">
    <div class="section-head">
      <div class="section-label">${esc(d.label)}</div>
      <h2>${esc(d.title)}</h2>
      <p class="section-sub">${esc(d.subtitle)}</p>
    </div>
    <div class="steps">${steps}</div>
  </section>`;
}

function renderGallery(d) {
  const items = (d.items || []).map(item => {
    const inner = item.image
      ? `<img src="${esc(item.image)}" alt="${esc(item.label)}" loading="lazy" />`
      : `<div class="gallery-placeholder" style="background:${esc(item.bg||'#111')}">${item.emoji||'🖨️'}<span class="gallery-label">${esc(item.label)}</span></div>`;
    return `<div class="gallery-item">${inner}</div>`;
  }).join('');
  return `
  <section id="gallery">
    <div class="section-head">
      <div class="section-label">${esc(d.label)}</div>
      <h2>${esc(d.title)}</h2>
      <p class="section-sub">${esc(d.subtitle)}</p>
    </div>
    <div class="gallery-grid">${items}</div>
    ${d.note ? `<p class="gallery-note">${esc(d.note)}</p>` : ''}
  </section>`;
}

function renderPricing(d) {
  const rows = (d.rows || []).map(r => `
    <tr>
      <td>${esc(r.item_type)}</td>
      <td>${esc(r.example)}</td>
      <td class="price-from">${esc(r.price)}</td>
      <td>${esc(r.turnaround)}</td>
    </tr>`).join('');
  return `
  <section id="pricing">
    <div class="section-head">
      <div class="section-label">${esc(d.label)}</div>
      <h2>${esc(d.title)}</h2>
      <p class="section-sub">${esc(d.subtitle)}</p>
    </div>
    <table class="pricing-table">
      <thead><tr><th>Item type</th><th>Example</th><th>From</th><th>Turnaround</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${d.note ? `<div class="pricing-note">${esc(d.note)}</div>` : ''}
  </section>`;
}

function renderOrder(d, site) {
  const pills = (d.steps || []).map((s, i) => `
    <div class="order-step-pill"><span class="pill-num">${i+1}</span>${esc(s.text)}</div>`).join('');
  return `
  <section id="order">
    <div class="section-label">${esc(d.label)}</div>
    <h2>${esc(d.title)}</h2>
    <p class="section-sub">${esc(d.subtitle)}</p>
    <div class="order-steps">${pills}</div>
    <a class="btn-order" href="${mailtoLink(site.email, site.name)}">✉ ${esc(d.button_text)}</a>
    <p class="order-sub">${esc(d.sub_text)}</p>
  </section>`;
}

function renderFAQ(d) {
  const items = (d.items || []).map(item => `
    <div class="faq-item">
      <div class="faq-q">${esc(item.q)} <span class="faq-icon">+</span></div>
      <div class="faq-a">${esc(item.a)}</div>
    </div>`).join('');
  return `
  <section id="faq">
    <div class="section-head">
      <div class="section-label">${esc(d.label)}</div>
      <h2>${esc(d.title)}</h2>
    </div>
    <div class="faq-list">${items}</div>
  </section>`;
}

function renderFooter(site, enabledSections) {
  const links = enabledSections.filter(Boolean).map(id =>
    `<a href="#${id}">${id.charAt(0).toUpperCase()+id.slice(1)}</a>`).join('');
  const footerLogo = `<svg height="28" viewBox="0 0 160 36" xmlns="http://www.w3.org/2000/svg" aria-label="ForgeLayer">
    <polygon points="15,20 29,27 15,34 1,27"  fill="#005a42"/>
    <polygon points="15,11 25,17 15,23 5,17"  fill="#00906a"/>
    <polygon points="15,3 22,8 15,13 8,8"     fill="#00d9a6"/>
    <text x="38" y="23" font-family="'Segoe UI',system-ui,sans-serif" font-size="19" font-weight="900" fill="#ffffff">Forge<tspan fill="#00d9a6" font-weight="300">Layer</tspan></text>
  </svg>`;
  return `
    <div class="footer-logo">${footerLogo}</div>
    <p>${esc(site.footer_text)}</p>
    <div class="footer-links">${links}<a href="mailto:${esc(site.email)}">Contact</a></div>`;
}

// ─── Nav builder ─────────────────────────────────────────────────────────────
function buildNav(data) {
  const sections = [
    data.products?.enabled && ['products', 'Products'],
    data.how?.enabled      && ['how',      'How it works'],
    data.gallery?.enabled  && ['gallery',  'Gallery'],
    data.pricing?.enabled  && ['pricing',  'Pricing'],
    data.faq?.enabled      && ['faq',      'FAQ'],
  ].filter(Boolean);
  const links = sections.map(([id, label]) => `<a href="#${id}">${label}</a>`).join('');
  document.getElementById('navLinks').innerHTML =
    links + `<a href="#order" class="nav-cta">Place an Order</a>`;
}

// ─── Main render ─────────────────────────────────────────────────────────────
function renderSite(data) {
  const s = data.site;
  const sections = [];
  const enabledIds = [];

  if (data.hero?.enabled)     { sections.push(renderHero(data.hero, s)); enabledIds.push('home'); }
  if (data.products?.enabled) { sections.push(renderProducts(data.products)); enabledIds.push('products'); }
  if (data.how?.enabled)      { sections.push(renderHow(data.how)); enabledIds.push('how'); }
  if (data.gallery?.enabled)  { sections.push(renderGallery(data.gallery)); enabledIds.push('gallery'); }
  if (data.pricing?.enabled)  { sections.push(renderPricing(data.pricing)); enabledIds.push('pricing'); }
  if (data.order?.enabled)    { sections.push(renderOrder(data.order, s)); enabledIds.push('order'); }
  if (data.faq?.enabled)      { sections.push(renderFAQ(data.faq)); enabledIds.push('faq'); }

  document.getElementById('page-content').innerHTML = sections.join('');
  document.getElementById('site-footer').innerHTML  = renderFooter(s, enabledIds);
  document.title = `${s.name} — Custom 3D Prints`;

  buildNav(data);
  initInteractions();

  // Hide loader
  const loader = document.getElementById('loader');
  loader.style.opacity = '0';
  setTimeout(() => loader.remove(), 400);
}

// ─── Interactions (after render) ─────────────────────────────────────────────
function initInteractions() {
  // Mobile nav
  const hamburger = document.getElementById('hamburger');
  const navLinks  = document.getElementById('navLinks');
  hamburger.addEventListener('click', () => navLinks.classList.toggle('open'));
  navLinks.querySelectorAll('a').forEach(a =>
    a.addEventListener('click', () => navLinks.classList.remove('open')));

  // FAQ accordion
  document.querySelectorAll('.faq-q').forEach(q => {
    q.addEventListener('click', () => {
      const ans  = q.nextElementSibling;
      const icon = q.querySelector('.faq-icon');
      const open = ans.style.display === 'block';
      ans.style.display = open ? 'none' : 'block';
      icon.textContent  = open ? '+' : '−';
    });
  });

  // Active nav highlight
  const navAs = document.querySelectorAll('.nav-links a:not(.nav-cta)');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        navAs.forEach(a => a.style.color = '');
        const active = document.querySelector(`.nav-links a[href="#${e.target.id}"]`);
        if (active) active.style.color = '#fff';
      }
    });
  }, { threshold: 0.35 });
  document.querySelectorAll('section[id]').forEach(s => observer.observe(s));
}

// ─── Boot ────────────────────────────────────────────────────────────────────
loadContent().then(renderSite);
</script>


<style>
#fl-cat-page,#fl-prod-page{display:none;min-height:80vh;padding:48px 5%;background:var(--black)}
#fl-cat-page h2{color:var(--text);font-size:2rem;margin-bottom:8px}
#fl-cat-page p.fl-desc{color:var(--muted);margin-bottom:32px}
.fl-back{background:none;border:1px solid var(--border);color:var(--muted);padding:8px 20px;border-radius:var(--radius);cursor:pointer;margin-bottom:32px;font-size:0.9rem}
.fl-back:hover{color:var(--text);border-color:var(--muted)}
.fl-prod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
@media(max-width:900px){.fl-prod-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.fl-prod-grid{grid-template-columns:1fr}}
.fl-prod-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s}
.fl-prod-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.fl-prod-img{width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--dark);display:flex;align-items:center;justify-content:center;font-size:3rem;color:var(--muted)}
.fl-prod-name{padding:12px 14px 4px;color:var(--text);font-weight:600;font-size:0.95rem}
.fl-prod-price{padding:4px 14px 12px;color:var(--accent);font-size:0.85rem}
#fl-prod-page h2{color:var(--text);font-size:1.8rem;margin-bottom:8px}
.fl-prod-detail{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:32px}
@media(max-width:700px){.fl-prod-detail{grid-template-columns:1fr}}
.fl-gal-main{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:var(--radius);background:var(--dark);display:flex;align-items:center;justify-content:center;font-size:5rem;color:var(--muted)}
.fl-prod-info h3{color:var(--text);font-size:1.5rem;margin-bottom:8px}
.fl-prod-info .fl-price{color:var(--accent);font-size:1.3rem;font-weight:700;margin-bottom:16px}
.fl-prod-info p{color:var(--muted);line-height:1.7;margin-bottom:24px}
.fl-order-btn{background:var(--accent);color:#000;border:none;padding:14px 32px;border-radius:var(--radius);font-weight:700;font-size:1rem;cursor:pointer;text-decoration:none;display:inline-block}
.fl-order-btn:hover{opacity:0.9}
.product-card{cursor:pointer}
.product-card::after{pointer-events:none!important}
</style>

<div id="fl-cat-page">
  <button class="fl-back" onclick="window.flShowHome()">&#8592; Back</button>
  <h2 id="fl-cat-title"></h2>
  <p class="fl-desc" id="fl-cat-desc"></p>
  <div class="fl-prod-grid" id="fl-prod-grid"></div>
</div>

<div id="fl-prod-page">
  <button class="fl-back" id="fl-prod-back">&#8592; Back to category</button>
  <div class="fl-prod-detail">
    <div><div class="fl-gal-main" id="fl-gal-main">&#128424;</div></div>
    <div class="fl-prod-info">
      <h3 id="fl-detail-name"></h3>
      <div class="fl-price" id="fl-detail-price"></div>
      <p id="fl-detail-desc"></p>
      <a class="fl-order-btn" id="fl-order-btn" href="mailto:orders@forgelayer.online">Order this item</a>
    </div>
  </div>
</div>

<script>
(function(){
var _C=null,_curCatId=null,_curCatName=null;
var CATS=[
  {id:'household',name:'Home & Organisation',description:'Practical prints that make your space work smarter.'},
  {id:'prototypes',name:'Prototypes & Parts',description:'Custom brackets, replacement parts and prototypes.'},
  {id:'gifts',name:'Custom Name & Text',description:'Personalised with any name, word or short message.'},
  {id:'decor',name:'Gifts & Decor',description:'Decorative prints and thoughtful gifts that stand out.'}
];
var PRODUCTS={
  household:[
    {id:'h1',name:'Desk Cable Organiser',price:'€6',description:'Keep your desk tidy with this custom cable management solution.'},
    {id:'h2',name:'Wall Hook Set (3 pcs)',price:'€5',description:'Sturdy wall hooks for coats, bags or keys. Available in any colour.'},
    {id:'h3',name:'Bedside Phone Stand',price:'€4',description:'Adjustable phone stand perfect for nightstands.'},
    {id:'h4',name:'Spice Jar Label Clips',price:'€4',description:'Clip-on labels for standard spice jars. Custom text printed.'},
    {id:'h5',name:'Drawer Divider Set',price:'€8',description:'Custom-sized dividers for any drawer. Keeps things neat.'},
    {id:'h6',name:'Toothbrush & Soap Holder',price:'€5',description:'Hygienic bathroom organiser. Easy to clean, waterproof PLA.'}
  ],
  prototypes:[
    {id:'p1',name:'Custom Bracket / Mount',price:'€10',description:'Need a specific bracket or mount? We design and print to your exact dimensions.'},
    {id:'p2',name:'Enclosure / Housing',price:'€15',description:'Custom enclosures for electronics, sensors or small devices.'},
    {id:'p3',name:'Replacement Part',price:'€8',description:'Broken plastic part? Send us a photo and we will print a replacement.'},
    {id:'p4',name:'Jig or Fixture',price:'€12',description:'Workshop jigs and fixtures printed to your specifications.'},
    {id:'p5',name:'Concept Prototype',price:'€20',description:'Turn your idea into a physical prototype from sketches or CAD files.'},
    {id:'p6',name:'Mechanical Test Part',price:'€14',description:'Test fit and function before committing to expensive manufacturing.'}
  ],
  gifts:[
    {id:'g1',name:'Custom Name Keychain',price:'€5',description:'Personalised keychain with any name or short text. Durable PLA.'},
    {id:'g2',name:'Desk Name Plate',price:'€7',description:'Professional desk nameplate for home or office. Custom text, any colour.'},
    {id:'g3',name:'Mini Planter (personalised)',price:'€8',description:'Small planter with your name or message. Perfect for succulents.'},
    {id:'g4',name:'Baby Name Wall Letters',price:'€12',description:'Individual letters to spell any name. Great for nurseries.'},
    {id:'g5',name:'Wedding Favour Tags (10 pcs)',price:'€15',description:'Custom tags for wedding favours. Names or dates printed. Pack of 10.'},
    {id:'g6',name:'Pet Name Tag',price:'€4',description:'Durable pet ID tag with name and phone number. Bright colours available.'}
  ],
  decor:[
    {id:'d1',name:'Geometric Vase (small)',price:'€9',description:'Modern geometric vase for dried or artificial flowers.'},
    {id:'d2',name:'Wall Art Panel',price:'€12',description:'Decorative wall panel in geometric or nature-inspired patterns.'},
    {id:'d3',name:'Floating Shelf Bracket',price:'€7',description:'Stylish shelf brackets in modern geometric design. Sold as a pair.'},
    {id:'d4',name:'Candle Holder Set (3 pcs)',price:'€10',description:'Set of 3 geometric candle holders. Fits standard tea light candles.'},
    {id:'d5',name:'Plant Pot Stand',price:'€8',description:'Elevated stand for plant pots up to 15cm diameter.'},
    {id:'d6',name:'Lamp Shade (geometric)',price:'€18',description:'Geometric lamp shade that casts beautiful shadow patterns.'}
  ]
};
function getProd(catId){
  if(_C&&_C.products&&_C.products[catId]&&_C.products[catId].length)return _C.products[catId];
  return PRODUCTS[catId]||[];
}
function getCats(){
  if(_C&&_C.products&&_C.products.items&&_C.products.items.length){
    return _C.products.items.map(function(item,i){
      return{id:CATS[i]?CATS[i].id:'household',name:item.title||(CATS[i]?CATS[i].name:''),description:item.description||(CATS[i]?CATS[i].description:'')};
    });
  }
  return CATS;
}
function wireCards(){
  var cards=document.querySelectorAll('.product-card');
  if(!cards.length)return false;
  var cats=getCats();
  cards.forEach(function(card,i){
    if(card._flWired)return;
    card._flWired=true;
    var cat=cats[i]||cats[0];
    card.style.cursor='pointer';
    card.addEventListener('click',function(e){e.preventDefault();openCat(cat.id,cat.name,cat.description||'');});
  });
  return true;
}
function tryWire(n){n=n||0;if(wireCards())return;if(n<30)setTimeout(function(){tryWire(n+1);},300);}
function init(){
  fetch('content.json?t='+Date.now()).then(function(r){return r.json();}).then(function(d){_C=d;tryWire(0);}).catch(function(){tryWire(0);});
  tryWire(0);
}
window.flShowHome=function(){
  document.getElementById('fl-cat-page').style.display='none';
  document.getElementById('fl-prod-page').style.display='none';
  document.querySelectorAll('body>*:not(#fl-cat-page):not(#fl-prod-page):not(script):not(style)').forEach(function(el){if(el._flHidden){el.style.display='';el._flHidden=false;}});
  window.scrollTo(0,0);
};
function hideHome(){
  document.querySelectorAll('body>*:not(#fl-cat-page):not(#fl-prod-page):not(script):not(style)').forEach(function(el){if(el.style.display!=='none'){el._flHidden=true;el.style.display='none';}});
}
function openCat(catId,name,desc){
  _curCatId=catId;_curCatName=name;
  hideHome();
  document.getElementById('fl-cat-page').style.display='block';
  document.getElementById('fl-prod-page').style.display='none';
  document.getElementById('fl-cat-title').textContent=name;
  document.getElementById('fl-cat-desc').textContent=desc;
  var grid=document.getElementById('fl-prod-grid');
  var prods=getProd(catId);
  grid.innerHTML=prods.map(function(p){
    var img=(p.images&&p.images.length)?'<img src="'+p.images[0]+'" alt="'+p.name+'" style="width:100%;height:100%;object-fit:cover" onerror="this.outerHTML='&#128424;'">'
      :'<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:3rem">&#128424;</div>';
    return'<div class="fl-prod-card" onclick="window.flOpenProd(''+catId+'',''+p.id+'')"><div class="fl-prod-img">'+img+'</div><div class="fl-prod-name">'+p.name+'</div><div class="fl-prod-price">'+p.price+'</div></div>';
  }).join('');
  window.scrollTo(0,0);
}
window.flOpenProd=function(catId,pid){
  var prods=getProd(catId);
  var prod=prods.find(function(p){return p.id===pid;})||prods[0];
  if(!prod)return;
  document.getElementById('fl-cat-page').style.display='none';
  document.getElementById('fl-prod-page').style.display='block';
  var main=document.getElementById('fl-gal-main');
  if(prod.images&&prod.images.length){main.innerHTML='<img src="'+prod.images[0]+'" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius)">';}
  else{main.innerHTML='<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:5rem">&#128424;</div>';}
  document.getElementById('fl-detail-name').textContent=prod.name;
  document.getElementById('fl-detail-price').textContent=prod.price;
  document.getElementById('fl-detail-desc').textContent=prod.description;
  document.getElementById('fl-order-btn').href='mailto:orders@forgelayer.online?subject=Order: '+encodeURIComponent(prod.name);
  document.getElementById('fl-prod-back').onclick=function(){document.getElementById('fl-prod-page').style.display='none';document.getElementById('fl-cat-page').style.display='block';window.scrollTo(0,0);};
  window.scrollTo(0,0);
};
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}else{setTimeout(init,200);}
})();
</script>
</body>
